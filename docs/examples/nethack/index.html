<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NetHack 5.0 - WASM</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
body {
    background: #000;
    color: #aaa;
    font-family: 'Courier New', Courier, monospace;
    display: flex;
    flex-direction: column;
    align-items: center;
    min-height: 100vh;
    padding: 8px;
}
h1 { color: #ff0; font-size: 14px; margin-bottom: 4px; }
#loading {
    color: #0f0;
    font-size: 16px;
    margin: 20px;
    white-space: pre;
}
#game-container {
    display: none;
    flex-direction: column;
    align-items: center;
    width: 100%;
}
#messages {
    background: #111;
    border: 1px solid #333;
    color: #fff;
    font-size: 13px;
    padding: 2px 6px;
    width: 100%;
    max-width: 800px;
    min-height: 20px;
    white-space: pre-wrap;
    word-break: break-all;
}
#map-canvas {
    border: 1px solid #444;
    display: block;
    image-rendering: pixelated;
    cursor: default;
}
#status {
    background: #111;
    border: 1px solid #333;
    color: #aaa;
    font-size: 12px;
    padding: 2px 6px;
    width: 100%;
    max-width: 800px;
    min-height: 18px;
    white-space: pre;
}
#input-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    z-index: 100;
}
#input-overlay.active { display: flex; }
#input-box {
    background: #111;
    border: 2px solid #ff0;
    color: #fff;
    padding: 16px 24px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    min-width: 400px;
    max-width: 80vw;
}
#input-box .prompt { color: #ff0; margin-bottom: 8px; }
#input-box input[type=text] {
    background: #000;
    border: 1px solid #555;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    padding: 4px 8px;
    width: 100%;
    margin-top: 6px;
}
#menu-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.85);
    justify-content: center;
    align-items: flex-start;
    padding-top: 40px;
    z-index: 200;
    overflow-y: auto;
}
#menu-overlay.active { display: flex; }
#menu-box {
    background: #111;
    border: 2px solid #0af;
    color: #fff;
    padding: 12px 20px;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    min-width: 500px;
    max-width: 90vw;
    max-height: 80vh;
    overflow-y: auto;
}
#menu-box .title { color: #0af; font-size: 15px; margin-bottom: 8px; border-bottom: 1px solid #0af; padding-bottom: 4px; }
.menu-item { padding: 8px 4px; cursor: pointer; min-height: 36px; display: flex; align-items: center; border-bottom: 1px solid #1a1a1a; }
.menu-item:hover, .menu-item:active { background: #222; }
.menu-item.selected { color: #ff0; }
.menu-item .key { color: #0f0; display: inline-block; width: 20px; }
#menu-box .footer { color: #888; font-size: 12px; margin-top: 8px; border-top: 1px solid #333; padding-top: 4px; }

/* モバイルキーボードボタン */
#keyboard-btn {
    position: fixed;
    bottom: 16px;
    right: 16px;
    background: #ff0;
    color: #000;
    border: none;
    border-radius: 50%;
    width: 52px;
    height: 52px;
    font-size: 24px;
    cursor: pointer;
    z-index: 999;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    display: none;
}
#keyboard-hint {
    color: #555;
    font-size: 11px;
    text-align: center;
    margin-top: 4px;
    display: none;
}
/* モバイル検出時に表示 */
@media (pointer: coarse) {
    #keyboard-btn { display: block; }
    #keyboard-hint { display: block; }
}
/* 隠しモバイル入力 */
#mobile-input {
    position: fixed;
    opacity: 0;
    top: 0; left: 0;
    width: 1px; height: 1px;
    font-size: 16px; /* iOSズームを防止 */
    border: none;
    background: transparent;
    z-index: -1;
}

/* モバイルナビゲーションバー */
#nav-bar {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: #111;
    border-top: 1px solid #333;
    padding: 6px 8px;
    z-index: 998;
    gap: 6px;
    justify-content: center;
    align-items: center;
    flex-wrap: wrap;
}
@media (pointer: coarse) {
    #nav-bar { display: flex; }
    body { padding-bottom: 72px; }
}
.nav-btn {
    background: #222;
    color: #fff;
    border: 1px solid #555;
    border-radius: 6px;
    min-width: 44px;
    height: 44px;
    font-size: 18px;
    cursor: pointer;
    padding: 0 8px;
    -webkit-tap-highlight-color: rgba(255,255,0,0.3);
    user-select: none;
}
.nav-btn:active { background: #444; }
.nav-btn.yn { background: #220; color: #ff0; border-color: #ff0; }
.nav-btn.enter { background: #020; color: #0f0; border-color: #0f0; }
.nav-btn.esc { background: #200; color: #f44; border-color: #f44; }
#debug-panel {
    background: #001;
    border: 1px solid #0af;
    color: #0af;
    font-size: 10px;
    padding: 4px 6px;
    width: 100%;
    max-width: 800px;
    min-height: 60px;
    white-space: pre-wrap;
    word-break: break-all;
    margin-top: 2px;
    display: none;
}
#debug-toggle {
    font-size: 11px;
    color: #555;
    cursor: pointer;
    margin-top: 2px;
}

</style>
</head>
<body>
<h1>⚔️ NetHack 5.0 — WASM</h1>
<div id="loading">Loading NetHack WASM...</div>
<div id="game-container">
    <div id="messages"></div>
    <canvas id="map-canvas"></canvas>
    <div id="keyboard-hint">📱 タップしてキーボードを表示</div>
    <div id="status"></div>
    <div id="debug-toggle" onclick="document.getElementById('debug-panel').style.display = document.getElementById('debug-panel').style.display==='none'?'block':'none'">🔍 デバッグ情報</div>
    <div id="debug-panel"></div>
</div>

<!-- モバイル用隠し入力 -->
<input type="text" id="mobile-input"
    autocomplete="off" autocorrect="off"
    autocapitalize="none" spellcheck="false"
    inputmode="text" />

<!-- モバイルキーボードボタン -->
<button id="keyboard-btn" title="キーボード表示">⌨️</button>

<!-- モバイルナビゲーションバー -->
<div id="nav-bar">
    <button class="nav-btn" data-key="27">✕ ESC</button>
    <button class="nav-btn" data-key="107">↑</button>
    <button class="nav-btn" data-key="106">↓</button>
    <button class="nav-btn" data-key="104">←</button>
    <button class="nav-btn" data-key="108">→</button>
    <button class="nav-btn enter" data-key="13">↵ Enter</button>
    <button class="nav-btn yn" data-key="121">Y</button>
    <button class="nav-btn yn" data-key="110">N</button>
    <button class="nav-btn" data-key="32">Space</button>
    <button class="nav-btn" id="keyboard-btn-bar">⌨️</button>
</div>

<!-- テキスト入力オーバーレイ -->
<div id="input-overlay">
    <div id="input-box">
        <div class="prompt" id="input-prompt"></div>
        <input type="text" id="input-field" autocomplete="off" autocorrect="off" spellcheck="false"/>
    </div>
</div>

<!-- メニューオーバーレイ -->
<div id="menu-overlay">
    <div id="menu-box">
        <div class="title" id="menu-title"></div>
        <div id="menu-items"></div>
        <div class="footer" id="menu-footer"></div>
    </div>
</div>

<script type="module">
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NetHack WASM 2D キャラクターベース描画
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

const MAP_W = 80, MAP_H = 24;
const FONT_W = 10, FONT_H = 18;  // セルサイズ（ピクセル）
const FONT_SIZE = 16;

// NetHack カラーパレット（CLR_xxx）
const NH_COLORS = [
    '#555555', // 0  CLR_BLACK  → dark gray (黒背景では見えないので)
    '#CC0000', // 1  CLR_RED
    '#00AA00', // 2  CLR_GREEN
    '#AA5500', // 3  CLR_BROWN
    '#0000CC', // 4  CLR_BLUE
    '#AA00AA', // 5  CLR_MAGENTA
    '#00AAAA', // 6  CLR_CYAN
    '#AAAAAA', // 7  CLR_GRAY (light gray)
    '#AAAAAA', // 8  CLR_NO_COLOR
    '#FF5500', // 9  CLR_ORANGE
    '#00FF00', // 10 CLR_BRIGHT_GREEN
    '#FFFF00', // 11 CLR_YELLOW
    '#5555FF', // 12 CLR_BRIGHT_BLUE
    '#FF55FF', // 13 CLR_BRIGHT_MAGENTA
    '#55FFFF', // 14 CLR_BRIGHT_CYAN
    '#FFFFFF', // 15 CLR_WHITE
];

// glyph_info 構造体オフセット（C struct layout）
// typedef struct glyphinfo {
//   int glyph;          offset  0 (4 bytes)
//   int ttychar;        offset  4 (4 bytes)  ← 表示文字
//   uint32 framecolor;  offset  8 (4 bytes)
//   glyph_map gm;       offset 12
//     unsigned glyphflags; offset 12 (4 bytes)
//     struct classic_representation sym; // color(int)+symidx(int) offset 16,20
//       int color;      offset 16 (4 bytes)  ← 色
//       int symidx;     offset 20 (4 bytes)
//     uint32 customcolor; offset 24
//     uint16 color256idx; offset 28
//     short tileidx;    offset 30
// } glyph_info;
const GLYPH_TTYCHAR_OFFSET = 4;
const GLYPH_COLOR_OFFSET = 16;

// ━━ Canvas セットアップ ━━
const canvas = document.getElementById('map-canvas');
canvas.width  = MAP_W * FONT_W;
canvas.height = MAP_H * FONT_H;
const ctx = canvas.getContext('2d');
ctx.font = `${FONT_SIZE}px 'Courier New', monospace`;
ctx.textBaseline = 'top';

// ━━ ゲーム状態 ━━
const mapTiles = new Array(MAP_H).fill(null).map(() =>
    new Array(MAP_W).fill(null).map(() => ({ ch: ' ', color: '#aaa', bgColor: '#000' }))
);
let wasmModule = null;
let mapDirty = false;

// ━━ デバッグ ━━
const debugPanel = document.getElementById('debug-panel');
let debugLines = [];
let glyphCallCount = 0;
let glyphSample = null;
function dbg(msg) {
    debugLines.push(msg);
    if (debugLines.length > 20) debugLines.shift();
    debugPanel.textContent = debugLines.join('\n');
}

const messagesEl = document.getElementById('messages');
const statusEl = document.getElementById('status');
function showMessage(str) {
    if (!str) return;
    messagesEl.textContent = str;
}

// ━━ キャンバス描画 ━━
function renderMap() {
    ctx.fillStyle = '#000';
    ctx.fillRect(0, 0, canvas.width, canvas.height);
    for (let y = 0; y < MAP_H; y++) {
        for (let x = 0; x < MAP_W; x++) {
            const tile = mapTiles[y][x];
            if (tile.ch !== ' ') {
                ctx.fillStyle = tile.bgColor || '#000';
                ctx.fillRect(x * FONT_W, y * FONT_H, FONT_W, FONT_H);
                ctx.fillStyle = tile.color;
                ctx.fillText(tile.ch, x * FONT_W, y * FONT_H);
            }
        }
    }
    mapDirty = false;
}

function setTile(x, y, ch, color, bgColor) {
    if (x < 0 || x >= MAP_W || y < 0 || y >= MAP_H) return;
    mapTiles[y][x] = { ch, color, bgColor: bgColor || '#000' };
    mapDirty = true;
}

// ━━ キー入力キュー ━━
let keyQueue = [];
let keyResolve = null;

const mobileInput = document.getElementById('mobile-input');
const keyboardBtn = document.getElementById('keyboard-btn');

// モバイル用: キャンバスタップでキーボード表示
canvas.addEventListener('click', () => {
    focusMobileInput();
});
canvas.addEventListener('touchend', (e) => {
    e.preventDefault();
    focusMobileInput();
});

// ⌨️ボタンでキーボード表示
keyboardBtn.addEventListener('click', () => {
    focusMobileInput();
});

// 番兵文字: iOSでBackspaceを検知するためフィールドを空にしない
const SENTINEL = '\u00a0'; // ノーブレークスペース
function focusMobileInput() {
    mobileInput.value = SENTINEL;
    mobileInput.setSelectionRange(SENTINEL.length, SENTINEL.length);
    mobileInput.focus();
}

// ナビバーボタン共通処理
function sendKey(keyCode) {
    if (keyResolve) {
        const resolve = keyResolve;
        keyResolve = null;
        resolve(keyCode);
    } else {
        keyQueue.push(keyCode);
    }
}

// ナビバーボタンのイベント設定
document.querySelectorAll('.nav-btn[data-key]').forEach(btn => {
    btn.addEventListener('touchstart', (e) => {
        e.preventDefault();
        sendKey(parseInt(btn.dataset.key));
    });
    btn.addEventListener('click', () => {
        sendKey(parseInt(btn.dataset.key));
    });
});

// ナビバーの⌨️ボタン
const keyboardBtnBar = document.getElementById('keyboard-btn-bar');
if (keyboardBtnBar) {
    keyboardBtnBar.addEventListener('click', () => {
        focusMobileInput();
    });
}

// キー入力の共通処理
function processKeyEvent(e) {
    const key = nethackKeyCode(e);
    if (key !== null) {
        e.preventDefault();
        if (keyResolve) {
            const resolve = keyResolve;
            keyResolve = null;
            resolve(key);
        } else {
            keyQueue.push(key);
        }
    }
}

// PC キーボード（canvasフォーカス不要に）
document.addEventListener('keydown', processKeyEvent);

// モバイル用: 隠し入力への入力
mobileInput.addEventListener('keydown', (e) => {
    processKeyEvent(e);
    // 番兵文字を維持（keydown後にリセット）
    setTimeout(() => {
        mobileInput.value = SENTINEL;
        mobileInput.setSelectionRange(SENTINEL.length, SENTINEL.length);
    }, 0);
});

// input イベント（keydownが発火しない入力メソッド対応 + Backspace検知）
mobileInput.addEventListener('input', (e) => {
    const val = mobileInput.value;
    if (val.length < SENTINEL.length) {
        // 番兵より短い = Backspace が押された
        sendKey(8); // BS
    } else {
        // 通常入力: 番兵より後ろの文字を取得
        const added = val.slice(SENTINEL.length);
        for (const ch of added) {
            sendKey(ch.charCodeAt(0));
        }
    }
    // 番兵を復元
    mobileInput.value = SENTINEL;
    mobileInput.setSelectionRange(SENTINEL.length, SENTINEL.length);
});

// NetHack キーコードへ変換
function nethackKeyCode(e) {
    // vi keys + arrow keys
    const map = {
        'ArrowUp': 107,    // 'k'
        'ArrowDown': 106,  // 'j'
        'ArrowLeft': 104,  // 'h'
        'ArrowRight': 108, // 'l'
    };
    if (map[e.key]) return map[e.key];
    if (e.key === 'Enter') return 13;
    if (e.key === 'Escape') return 27;
    if (e.key === ' ') return 32;
    if (e.key === 'Backspace') return 8;
    if (e.key.length === 1) return e.key.charCodeAt(0);
    // Numpad 対角線移動
    if (e.code === 'Numpad7') return 121; // y
    if (e.code === 'Numpad9') return 117; // u
    if (e.code === 'Numpad1') return 98;  // b
    if (e.code === 'Numpad3') return 110; // n
    if (e.code === 'Numpad5') return 46;  // .
    return null;
}

function waitForKey() {
    return new Promise(resolve => {
        if (keyQueue.length > 0) {
            resolve(keyQueue.shift());
        } else {
            keyResolve = resolve;
        }
    });
}

// ━━ テキスト入力ダイアログ ━━
const inputOverlay = document.getElementById('input-overlay');
const inputPromptEl = document.getElementById('input-prompt');
const inputField = document.getElementById('input-field');

function askLine(prompt) {
    return new Promise(resolve => {
        inputPromptEl.textContent = prompt;
        inputField.value = '';
        inputOverlay.classList.add('active');
        inputField.focus();

        function onKey(e) {
            if (e.key === 'Enter') {
                const val = inputField.value;
                inputField.removeEventListener('keydown', onKey);
                inputOverlay.classList.remove('active');
                canvas.focus();
                resolve(val);
            } else if (e.key === 'Escape') {
                inputField.removeEventListener('keydown', onKey);
                inputOverlay.classList.remove('active');
                canvas.focus();
                resolve('');
            }
        }
        inputField.addEventListener('keydown', onKey);
    });
}

// ━━ メニューシステム ━━
const menuOverlay = document.getElementById('menu-overlay');
const menuTitleEl = document.getElementById('menu-title');
const menuItemsEl = document.getElementById('menu-items');
const menuFooterEl = document.getElementById('menu-footer');

// ウィンドウ管理
let windows = {};
let nextWinId = 10;
let menus = {};      // winid → { items: [], prompt: '' }
let messages = [];   // メッセージウィンドウ用

function createWindow(type) {
    const id = nextWinId++;
    windows[id] = { type, content: [] };
    if (type === 4 /* NHW_MENU */ || type === 5 /* NHW_TEXT */) {
        menus[id] = { items: [], prompt: '', title: '', how: 0 };
    }
    return id;
}

function selectMenuItems(winId, how) {
    return new Promise(resolve => {
        const menu = menus[winId];
        if (!menu) { resolve([]); return; }

        menuTitleEl.textContent = menu.title || '';
        menuItemsEl.innerHTML = '';
        menuFooterEl.textContent = how === 0 ? '▼ タップまたはキーで閉じる' :
                                   how === 1 ? '▼ アイテムをタップして選択' :
                                               '▼ アイテムをタップして選択、Enterで決定';

        const selectedItems = [];

        menu.items.forEach((item, idx) => {
            const div = document.createElement('div');
            div.className = 'menu-item';
            div.dataset.idx = idx;
            const keyChar = item.ch || String.fromCharCode(97 + idx);
            div.innerHTML = `<span class="key">${keyChar})</span> ${item.str || ''}`;

            // タップ/クリックで選択
            function onItemSelect(e) {
                e.stopPropagation();
                if (how === 0 /* PICK_NONE */) {
                    cleanup([]);
                } else if (how === 1 /* PICK_ONE */) {
                    cleanup([{ item: item.identifier, count: -1 }]);
                } else {
                    // PICK_ANY: トグル
                    const existing = selectedItems.findIndex(s => s.item === item.identifier);
                    if (existing >= 0) {
                        selectedItems.splice(existing, 1);
                    } else {
                        selectedItems.push({ item: item.identifier, count: -1 });
                    }
                    updateMenuDisplay();
                }
            }
            div.addEventListener('touchend', (e) => { e.preventDefault(); onItemSelect(e); });
            div.addEventListener('click', onItemSelect);

            menuItemsEl.appendChild(div);
        });

        // PICK_ANY 用: メニュー外タップで決定
        if (how === 2) {
            menuOverlay.addEventListener('touchend', function onOverlayTap(e) {
                if (e.target === menuOverlay) {
                    menuOverlay.removeEventListener('touchend', onOverlayTap);
                    cleanup(selectedItems);
                }
            });
        }

        menuOverlay.classList.add('active');

        function onMenuKey(e) {
            const key = e.key;
            if (how === 0 /* PICK_NONE */ || key === 'Escape' || key === ' ' || key === 'Enter') {
                cleanup([]);
                return;
            }
            // 文字キーでアイテム選択
            const charCode = key.charCodeAt(0);
            const item = menu.items.find(i => i.ch && i.ch.charCodeAt(0) === charCode);
            if (item) {
                if (how === 1 /* PICK_ONE */) {
                    cleanup([{ item: item.identifier, count: -1 }]);
                } else {
                    // PICK_ANY: トグル
                    const existing = selectedItems.findIndex(s => s.item === item.identifier);
                    if (existing >= 0) {
                        selectedItems.splice(existing, 1);
                        updateMenuDisplay();
                    } else {
                        selectedItems.push({ item: item.identifier, count: -1 });
                        updateMenuDisplay();
                    }
                }
            }
        }

        function updateMenuDisplay() {
            menuItemsEl.querySelectorAll('.menu-item').forEach(div => {
                const idx = parseInt(div.dataset.idx);
                const item = menu.items[idx];
                const isSelected = selectedItems.some(s => s.item === item.identifier);
                div.classList.toggle('selected', isSelected);
            });
        }

        function cleanup(result) {
            document.removeEventListener('keydown', onMenuKey);
            menuOverlay.classList.remove('active');
            canvas.focus();
            resolve(result);
        }

        document.addEventListener('keydown', onMenuKey);
    });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NetHack shim コールバック実装
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function nethackCallback(name, ...args) {
    // console.log('CB:', name, args);

    switch (name) {
    // ── 初期化 ──
    case 'shim_init_nhwindows':
        document.getElementById('loading').style.display = 'none';
        document.getElementById('game-container').style.display = 'flex';
        document.getElementById('debug-panel').style.display = 'block';
        dbg('init_nhwindows: game started');
        canvas.focus();
        focusMobileInput();
        return;

    case 'shim_askname': {
        const playerName = await askLine('Enter your name:');
        // libnhmain が gr.plnamesiz を管理するので文字列を WASM メモリに書く
        const Module = wasmModule;
        const ptr = Module.nethackGlobal?.pointers?.['plnamesiz'] || 0;
        if (ptr) Module.stringToUTF8(playerName || 'Player', ptr, 256);
        return;
    }

    case 'shim_player_selection_or_tty':
        // true を返すと genl_player_setup(80) が呼ばれてランダム選択
        return true;

    // ── ウィンドウ管理 ──
    case 'shim_create_nhwindow': {
        const [type] = args;
        return createWindow(type);
    }

    case 'shim_clear_nhwindow': {
        const [winid] = args;
        if (windows[winid]) windows[winid].content = [];
        if (menus[winid]) menus[winid].items = [];
        // マップウィンドウのクリア
        if (windows[winid]?.type === 3 /* NHW_MAP */) {
            for (let y = 0; y < MAP_H; y++)
                for (let x = 0; x < MAP_W; x++)
                    mapTiles[y][x] = { ch: ' ', color: '#aaa', bgColor: '#000' };
        }
        return;
    }

    case 'shim_display_nhwindow': {
        const [winid, blocking] = args;
        const win = windows[winid];
        if (!win) return;
        if (win.type === 3 /* NHW_MAP */) {
            renderMap();
        } else if ((win.type === 4 || win.type === 5) && blocking) {
            // テキストウィンドウ表示 → キー待ち
            await waitForKey();
        }
        return;
    }

    case 'shim_destroy_nhwindow': {
        const [winid] = args;
        delete windows[winid];
        delete menus[winid];
        return;
    }

    // ── マップ描画 ──
    case 'shim_print_glyph': {
        const [winid, x, y, glyphPtr, bkGlyphPtr] = args;
        if (!glyphPtr) return;
        const Module = wasmModule;
        const ttychar   = Module.getValue(glyphPtr + GLYPH_TTYCHAR_OFFSET, 'i32');
        const colorIdx  = Module.getValue(glyphPtr + GLYPH_COLOR_OFFSET, 'i32');
        const ch = ttychar > 0 && ttychar < 128 ? String.fromCharCode(ttychar) : ' ';
        const color = NH_COLORS[colorIdx & 0xf] || '#aaa';
        setTile(x, y, ch, color, '#000');
        glyphCallCount++;
        // 最初の数個だけデバッグ表示
        if (glyphCallCount <= 5) {
            dbg(`glyph[${glyphCallCount}] xy=(${x},${y}) ptr=0x${glyphPtr.toString(16)} ttychar=${ttychar}(${ch}) color=${colorIdx}`);
        } else if (glyphCallCount === 6) {
            dbg(`... ${glyphCallCount}+ glyph calls (mapDirty=${mapDirty})`);
        }
        return;
    }

    case 'shim_curs': {
        const [winid, x, y] = args;
        // カーソル位置（現時点では無視）
        return;
    }

    // ── テキスト出力 ──
    case 'shim_putstr': {
        const [winid, attr, str] = args;
        const win = windows[winid];
        if (!str) return;
        if (win?.type === 1 /* NHW_MESSAGE */) {
            showMessage(str);
        } else if (win?.type === 2 /* NHW_STATUS */) {
            statusEl.textContent = (statusEl.textContent || '') + str + ' ';
        } else if (win?.type === 4 || win?.type === 5) {
            if (windows[winid]) windows[winid].content.push(str);
        }
        return;
    }

    case 'shim_raw_print':
    case 'shim_raw_print_bold': {
        const [str] = args;
        if (str) showMessage(str);
        return;
    }

    // ── 入力 ──
    case 'shim_nhgetch':
        // キー待ち前に必ずマップを描画する
        if (mapDirty) renderMap();
        dbg(`nhgetch wait (glyphCalls so far: ${glyphCallCount})`);
        return await waitForKey();

    case 'shim_nh_poskey': {
        if (mapDirty) renderMap();
        const key = await waitForKey();
        return key;
    }

    case 'shim_yn_function': {
        const [query, resp, def] = args;
        const prompt = `${query} [${resp || 'yn'}] `;
        showMessage(prompt + '█');
        // キー入力待ち
        let key;
        while (true) {
            key = await waitForKey();
            const ch = String.fromCharCode(key).toLowerCase();
            if (!resp || resp.toLowerCase().includes(ch)) break;
            if (key === 13 || key === 27) { key = def?.charCodeAt(0) || 'n'.charCodeAt(0); break; }
        }
        showMessage(prompt + String.fromCharCode(key));
        return key;
    }

    case 'shim_getlin': {
        const [query, bufPtr] = args;
        const val = await askLine(query || '');
        if (bufPtr && wasmModule) {
            wasmModule.stringToUTF8(val || '', bufPtr, 256);
        }
        return;
    }

    case 'shim_get_ext_cmd': {
        const cmd = await askLine('Extended command: #');
        // コマンド名を番号に変換（簡略化：-1で不明）
        return -1;
    }

    // ── メニュー ──
    case 'shim_start_menu': {
        const [winid, mbehavior] = args;
        if (menus[winid]) menus[winid].items = [];
        return;
    }

    case 'shim_add_menu': {
        const [winid, glyphPtr, identPtr, ch, gch, attr, clr, str, itemflags] = args;
        if (!menus[winid]) return;
        menus[winid].items.push({
            ch: ch > 0 ? String.fromCharCode(ch) : null,
            str: str || '',
            identifier: identPtr,
            attr, clr,
        });
        return;
    }

    case 'shim_end_menu': {
        const [winid, prompt] = args;
        if (menus[winid]) menus[winid].prompt = prompt || '';
        return;
    }

    case 'shim_select_menu': {
        const [winid, how, menuListPtr] = args;
        const result = await selectMenuItems(winid, how);
        return result.length;
    }

    case 'shim_message_menu': {
        const [ch, how, mesg] = args;
        showMessage(mesg || '');
        const key = await waitForKey();
        return key;
    }

    // ── 同期 ──
    case 'shim_mark_synch':
    case 'shim_wait_synch':
        dbg(`synch called: mapDirty=${mapDirty} glyphCalls=${glyphCallCount}`);
        renderMap();  // 常にレンダリング（mapDirty チェックなし）
        return;

    case 'shim_delay_output':
        await new Promise(r => setTimeout(r, 50));
        return;

    case 'shim_nhbell':
        return;

    case 'shim_cliparound':
        return;

    case 'shim_update_positionbar':
        return;

    // ── ステータス ──
    case 'shim_status_init':
        statusEl.textContent = '';
        return;

    case 'shim_status_enablefield':
        return;

    case 'shim_status_update': {
        // ステータスフィールド更新
        return;
    }

    // ── その他 ──
    case 'shim_get_nh_event':
        return;

    case 'shim_number_pad':
        return;

    case 'shim_doprev_message':
        return 0;

    case 'shim_exit_nhwindows': {
        const [str] = args;
        showMessage(str || 'Game over. Press F5 to restart.');
        return;
    }

    case 'shim_suspend_nhwindows':
    case 'shim_resume_nhwindows':
        return;

    case 'shim_display_file': {
        const [filename, complain] = args;
        return;
    }

    case 'shim_preference_update':
    case 'shim_change_color':
    case 'shim_change_background':
        return;

    case 'shim_getmsghistory':
        return '';

    case 'shim_putmsghistory':
        return;

    case 'shim_status_finish':
        return;

    default:
        // console.log('Unhandled callback:', name, args);
        return;
    }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// WASM 起動
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CALLBACK_NAME = 'nethackShimCallback';
globalThis[CALLBACK_NAME] = nethackCallback;

document.getElementById('loading').textContent =
    'Loading NetHack 5.0 WASM...\n(初回は数秒かかります)';

// nethack.js は ES6 モジュールとして export default される
import NetHackFactory from './nethack.js';

const Module = {
    locateFile: (path, prefix) => './' + path,
    onRuntimeInitialized: function() {
        console.log('NetHack WASM runtime initialized');
        document.getElementById('loading').textContent = 'Starting NetHack...';
        // shim コールバックを登録してからゲーム起動
        Module.ccall(
            'shim_graphics_set_callback',
            null,
            ['string'],
            [CALLBACK_NAME],
            { async: true }
        );
    },
    print: (text) => {
        console.log('[NH]', text);
        showMessage(text);
    },
    printErr: (text) => {
        console.warn('[NH ERR]', text);
    },
};

wasmModule = await NetHackFactory(Module);

canvas.setAttribute('tabindex', '0');
canvas.focus();
</script>
</body>
</html>
