<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>NetHack 5.0 — 3D View</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; }
html, body {
    width: 100%; height: 100%;
    overflow: hidden;
    background: #000;
    overscroll-behavior: none;
}

/* 3Dキャンバス: フルスクリーン */
#canvas3d {
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    display: block;
}

/* UIオーバーレイ: 最前面 */
#ui-overlay {
    position: fixed;
    top: 0; left: 0; right: 0;
    pointer-events: none;
    z-index: 10;
}
#messages {
    background: rgba(0,0,0,0.75);
    color: #fff;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    padding: 3px 8px;
    min-height: 20px;
    white-space: pre-wrap;
    word-break: break-all;
    pointer-events: auto;
}
#status {
    background: rgba(0,0,0,0.7);
    color: #aaa;
    font-family: 'Courier New', monospace;
    font-size: 11px;
    padding: 2px 8px;
    min-height: 16px;
    white-space: pre;
    pointer-events: auto;
}
#loading {
    position: fixed;
    top: 50%; left: 50%;
    transform: translate(-50%,-50%);
    color: #0f0;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    white-space: pre;
    text-align: center;
    z-index: 50;
}

/* 開発中バナー */
#dev-banner {
    position: fixed;
    top: 0; left: 0; right: 0;
    background: rgba(160,60,0,0.92);
    color: #ffe;
    font-family: 'Courier New', monospace;
    font-size: 12px;
    text-align: center;
    padding: 4px 8px;
    z-index: 2;
    pointer-events: none;
    letter-spacing: 0.03em;
}


#minimap-wrap {
    position: fixed;
    top: 44px; right: 8px;
    z-index: 20;
    pointer-events: none;
    transition: opacity 0.3s;
}
#minimap-wrap.hidden { opacity: 0; pointer-events: none; }
#minimap {
    display: block;
    border: 1px solid rgba(0,255,255,0.4);
    border-radius: 3px;
    background: rgba(0,0,0,0.55);
    image-rendering: pixelated;
}
#minimap-label {
    color: rgba(0,255,255,0.6);
    font-family: 'Courier New', monospace;
    font-size: 9px;
    text-align: center;
    margin-top: 1px;
}

/* カメラ切替ボタン */
#cam-btn {
    position: fixed;
    top: 8px; right: 8px;
    background: rgba(0,0,0,0.6);
    color: #0ff;
    border: 1px solid #0ff;
    border-radius: 6px;
    padding: 6px 12px;
    font-family: 'Courier New', monospace;
    font-size: 13px;
    cursor: pointer;
    z-index: 20;
    -webkit-tap-highlight-color: transparent;
    pointer-events: auto;
}
#cam-btn:active { background: rgba(0,255,255,0.2); }

/* デバッグパネル */
#debug-panel {
    position: fixed;
    bottom: 72px; left: 0; right: 0;
    background: rgba(0,0,16,0.8);
    border-top: 1px solid #0af;
    color: #0af;
    font-family: 'Courier New', monospace;
    font-size: 10px;
    padding: 4px 6px;
    white-space: pre-wrap;
    word-break: break-all;
    display: none;
    z-index: 20;
    pointer-events: none;
}
#debug-toggle {
    position: fixed;
    bottom: 70px; right: 8px;
    font-size: 11px;
    color: #555;
    cursor: pointer;
    z-index: 21;
    pointer-events: auto;
}

/* テキスト入力オーバーレイ */
#input-overlay {
    display: none;
    position: fixed;
    top: 0; left: 0; right: 0; bottom: 0;
    background: rgba(0,0,0,0.8);
    justify-content: center;
    align-items: center;
    z-index: 100;
    pointer-events: auto;
}
#input-overlay.active { display: flex; }
#input-box {
    background: #111;
    border: 2px solid #ff0;
    color: #fff;
    padding: 16px 24px;
    font-family: 'Courier New', monospace;
    font-size: 16px;
    min-width: min(400px, 90vw);
    max-width: 90vw;
}
#input-box .prompt { color: #ff0; margin-bottom: 8px; }
#input-box input[type=text] {
    background: #000;
    border: 1px solid #555;
    color: #fff;
    font-family: inherit;
    font-size: 14px;
    padding: 4px 8px;
    width: 100%;
    margin-top: 6px;
}

/* メニューオーバーレイ - Y/N と同じ下部カードスタイル */
#menu-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.75);
    justify-content: flex-end;
    align-items: stretch;
    flex-direction: column;
    z-index: 200;
    pointer-events: auto;
}
#menu-overlay.active { display: flex; }
#menu-box {
    background: #0a0a0a;
    border: 2px solid #0af;
    border-bottom: none;
    border-radius: 16px 16px 0 0;
    color: #fff;
    padding: 0 0 env(safe-area-inset-bottom, 0px);
    max-height: 72vh;
    display: flex;
    flex-direction: column;
    overflow: hidden;
}
#menu-box .title {
    color: #0af;
    font-family: 'Courier New', monospace;
    font-size: 15px;
    padding: 12px 16px 10px;
    border-bottom: 1px solid #0af3;
    flex-shrink: 0;
    letter-spacing: 0.05em;
}
#menu-items {
    overflow-y: auto;
    flex: 1;
    padding: 4px 0;
    -webkit-overflow-scrolling: touch;
}
.menu-item {
    display: flex;
    align-items: center;
    padding: 0 14px;
    min-height: 50px;
    cursor: pointer;
    border-bottom: 1px solid #1a1a1a;
    gap: 10px;
    -webkit-tap-highlight-color: rgba(0,170,255,0.15);
    user-select: none;
    font-family: 'Courier New', monospace;
    font-size: 14px;
}
.menu-item:active { background: #1a1a2a; }
.menu-item.selected { background: #1a1a00; }
.menu-item .key {
    display: inline-flex;
    align-items: center; justify-content: center;
    width: 28px; height: 28px;
    background: #002a00;
    border: 1px solid #0a0;
    border-radius: 6px;
    color: #0f0;
    font-size: 14px;
    font-weight: bold;
    flex-shrink: 0;
}
.menu-item.selected .key { background: #2a2a00; border-color: #ff0; color: #ff0; }
.menu-item .item-text { flex: 1; color: #ddd; }
.menu-item.selected .item-text { color: #ff0; }
.menu-item .check { font-size: 18px; color: #ff0; width: 20px; text-align: center; }
#menu-box .footer {
    flex-shrink: 0;
    padding: 8px 12px;
    border-top: 1px solid #0af3;
    display: flex;
    gap: 8px;
    justify-content: flex-end;
}
.menu-action-btn {
    padding: 10px 20px;
    border-radius: 8px;
    border: 2px solid #555;
    background: #222;
    color: #fff;
    font-size: 15px;
    font-weight: bold;
    cursor: pointer;
    -webkit-tap-highlight-color: rgba(255,255,0,0.2);
    min-height: 44px;
}
.menu-action-btn.confirm { background: #042; border-color: #0f0; color: #0f0; }
.menu-action-btn.cancel  { background: #200; border-color: #f44; color: #f44; }

/* 入力待ちインジケーター */
#input-ready {
    position: fixed;
    top: 46px; right: 8px;
    width: 8px; height: 8px;
    border-radius: 50%;
    background: #444;
    z-index: 30;
    transition: background 0.2s;
}
#input-ready.active {
    background: #0f0;
    box-shadow: 0 0 6px #0f0;
    animation: blink 1s infinite;
}
@keyframes blink { 0%,100%{opacity:1} 50%{opacity:0.3} }
/* タップして開始オーバーレイ (iOS focus許可用) */
#tap-start {
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.78);
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    z-index: 100;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
}
#tap-start .ts-logo {
    font-size: 52px;
    margin-bottom: 18px;
}
#tap-start .ts-msg {
    color: #0ff;
    font-family: 'Courier New', monospace;
    font-size: 22px;
    letter-spacing: 0.06em;
}
#tap-start .ts-sub {
    color: rgba(0,255,255,0.55);
    font-family: 'Courier New', monospace;
    font-size: 13px;
    margin-top: 10px;
}


    position: fixed;
    opacity: 0;
    top: 0; left: 0;
    width: 1px; height: 1px;
    font-size: 16px;
    border: none;
    background: transparent;
    z-index: -1;
}

/* モバイルキーボードボタン */
#keyboard-btn {
    position: fixed;
    bottom: 72px; right: 16px;
    background: #ff0;
    color: #000;
    border: none;
    border-radius: 50%;
    width: 52px; height: 52px;
    font-size: 24px;
    cursor: pointer;
    z-index: 30;
    box-shadow: 0 2px 8px rgba(0,0,0,0.5);
    display: none;
    -webkit-tap-highlight-color: transparent;
}
@media (pointer: coarse) { #keyboard-btn { display: block; } }

/* フロートキーボードボタン: ナビバー内に移したので非表示 */
#keyboard-btn { display: none !important; }

/* モバイルナビゲーションバー → 常時非表示 (kbd-panelに移行) */
#nav-bar { display: none !important; }

/* ━━ ジョイスティック ━━ */
#joy-zone {
    display: none; /* 旧タッチゾーン: 不使用 */
}
#cam-zone {
    position: fixed;
    right: 0; bottom: 66px;
    width: 48%; height: 52%;
    z-index: 15;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
}
/* ━━ Dパッド ━━ */
#dpad-wrap {
    position: fixed;
    left: 8px; bottom: 66px;
    width: 174px; height: 174px;
    z-index: 16;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    display: grid;
    grid-template-columns: repeat(3, 1fr);
    grid-template-rows: repeat(3, 1fr);
    gap: 5px;
}
.dp-btn {
    border-radius: 10px;
    border: 2px solid rgba(255,255,255,0.25);
    background: rgba(0,0,0,0.65);
    color: rgba(255,255,255,0.85);
    font-size: 22px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer;
    transition: background 0.06s, border-color 0.06s;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
}
.dp-btn.cardinal {
    background: rgba(10,25,55,0.82);
    border-color: rgba(80,160,255,0.50);
    font-size: 24px;
}
.dp-btn.center {
    background: rgba(30,30,30,0.70);
    border-color: rgba(255,255,255,0.20);
    font-size: 14px;
    color: rgba(255,255,255,0.45);
}
.dp-btn.diag {
    font-size: 18px;
    border-color: rgba(255,255,255,0.18);
    color: rgba(255,255,255,0.60);
}
.dp-btn.active, .dp-btn:active {
    background: rgba(50,120,220,0.60) !important;
    border-color: rgba(120,200,255,0.95) !important;
    color: #fff !important;
}
/* ━━ L/R ショルダーボタン ━━ */
.shoulder-btn {
    position: fixed;
    bottom: 248px;
    width: 58px; height: 34px;
    border-radius: 8px;
    border: 2px solid rgba(100,180,255,0.45);
    background: rgba(0,20,60,0.82);
    color: rgba(180,220,255,0.90);
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    z-index: 16;
    touch-action: none;
    -webkit-tap-highlight-color: transparent;
    -webkit-user-select: none; user-select: none;
    display: none;
    align-items: center; justify-content: center;
    letter-spacing: 0.05em;
}
.shoulder-btn:active {
    background: rgba(50,120,220,0.55);
    border-color: rgba(120,200,255,0.95);
}
#shoulder-l { left: 8px; }
#shoulder-r { right: 8px; }
@media (pointer: coarse) {
    .shoulder-btn { display: flex; }
}
/* ━━ アクションボタン (右下) ━━ */
#action-wrap {
    position: fixed;
    right: 8px; bottom: 66px;
    width: 182px;
    z-index: 16;
    touch-action: none;
    -webkit-user-select: none; user-select: none;
    display: flex;
    flex-direction: column;
    gap: 5px;
}
.act-row {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 5px;
}
.act-btn {
    height: 46px;
    border-radius: 10px;
    border: 2px solid rgba(255,200,80,0.30);
    background: rgba(30,15,0,0.75);
    color: rgba(255,200,100,0.90);
    font-size: 10px;
    font-weight: bold;
    cursor: pointer;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    gap: 1px;
    -webkit-tap-highlight-color: transparent;
    touch-action: none;
    line-height: 1.1;
}
.act-btn .act-icon { font-size: 16px; line-height: 1; }
.act-btn .act-lbl  { font-size: 9px; color: rgba(255,200,80,0.65); }
.act-btn:active {
    background: rgba(80,50,0,0.80);
    border-color: rgba(255,200,80,0.90);
    color: #fff;
}
.act-btn.yn-y { border-color: rgba(100,255,100,0.40); background: rgba(0,30,0,0.75); color: #8f8; }
.act-btn.yn-n { border-color: rgba(255,80,80,0.40);  background: rgba(30,0,0,0.75);  color: #f88; }
/* カメラスワイプ ヒント */
#cam-zone-hint {
    position: fixed;
    right: 12px;
    bottom: 68px;
    color: rgba(255,255,255,0.18);
    font-family: 'Courier New', monospace;
    font-size: 10px;
    pointer-events: none;
    z-index: 14;
    text-align: right;
    display: none;
}
@media (pointer: coarse) {
    #cam-zone-hint { display: block; }
    #cam-zone { display: block; }
}

/* ━━ ミニバー (常時表示フッター) ━━ */
#mini-bar {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 58px;
    background: rgba(0,0,0,0.92);
    border-top: 1px solid #383838;
    z-index: 25;
    align-items: center;
    justify-content: center;
    padding: 0 6px env(safe-area-inset-bottom, 4px);
    gap: 5px;
}
@media (pointer: coarse) { #mini-bar { display: flex; } }
.mini-btn {
    flex: 1;
    max-width: 68px;
    height: 44px;
    border-radius: 8px;
    border: 1px solid #444;
    background: #1a1a1a;
    color: #ccc;
    font-size: 13px;
    font-weight: bold;
    cursor: pointer;
    -webkit-tap-highlight-color: rgba(255,255,255,0.15);
    user-select: none;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    line-height: 1.2; gap: 1px;
}
.mini-btn span.lbl { font-size: 9px; color: #666; line-height: 1; }
.mini-btn:active { background: #333; }
.mini-btn.esc-btn { border-color: #a00; color: #f44; background: #200; }
.mini-btn.enter-btn { border-color: #0a0; color: #0f0; background: #020; }
.mini-btn.spc-btn { font-size: 18px; }
.mini-btn.kbd-btn.open { background: #332200; border-color: #ff0; color: #ff0; }
.mini-btn.cam-btn { color: #0ff; border-color: #0af; }
.mini-btn.rot-btn { display: none !important; }

/* ━━ キーボードパネル ━━ */
#kbd-panel {
    display: none;
    position: fixed;
    bottom: 58px; left: 0; right: 0;
    background: rgba(0,0,0,0.96);
    border-top: 1px solid #555;
    padding: 5px 4px 6px;
    z-index: 24;
    flex-direction: column;
    gap: 3px;
    max-height: 44vh;
    overflow-y: auto;
}
#kbd-panel.open { display: flex; }

/* ━━ エンティティ情報ポップアップ ━━ */
#entity-popup {
    position: fixed;
    z-index: 55;
    background: rgba(4, 8, 18, 0.95);
    border: 2px solid #0af;
    border-radius: 12px;
    padding: 10px 14px 10px;
    color: #fff;
    font-family: 'Courier New', monospace;
    min-width: 150px; max-width: 240px;
    display: none;
    pointer-events: none;
    box-shadow: 0 4px 24px rgba(0,170,255,0.35);
    animation: popIn 0.15s ease-out;
}
#entity-popup.has-actions { pointer-events: auto; }
@keyframes popIn { from { transform: scale(0.85); opacity: 0; } to { transform: scale(1); opacity: 1; } }
#entity-popup .ep-emoji { font-size: 28px; display: block; text-align: center; margin-bottom: 4px; }
#entity-popup .ep-title { color: #0ff; font-size: 14px; font-weight: bold; text-align: center; margin-bottom: 6px; }
#entity-popup .ep-row { color: #aaa; font-size: 11px; margin-top: 2px; }
#entity-popup .ep-row span { color: #ddd; }
#ep-actions { display: flex; gap: 6px; margin-top: 8px; flex-wrap: wrap; justify-content: center; }
.ep-act-btn {
    padding: 5px 10px;
    border-radius: 7px;
    border: 2px solid rgba(255,80,80,0.6);
    background: rgba(60,0,0,0.85);
    color: #f88;
    font-size: 12px;
    font-weight: bold;
    cursor: pointer;
    -webkit-tap-highlight-color: transparent;
}
.ep-act-btn:active { background: rgba(140,20,20,0.9); border-color: #f44; color: #fff; }
.ep-act-btn.ep-act-look { border-color: rgba(80,180,255,0.5); background: rgba(0,20,50,0.85); color: #8cf; }

/* モバイルナビゲーションバー */
#nav-bar {
    display: none;
    position: fixed;
    bottom: 0; left: 0; right: 0;
    background: rgba(0,0,0,0.92);
    border-top: 1px solid #444;
    padding: 4px 4px env(safe-area-inset-bottom, 4px);
    z-index: 25;
    flex-direction: column;
    gap: 3px;
    pointer-events: auto;
}
@media (pointer: coarse) { #nav-bar { display: flex; } }
.nav-row { display: flex; justify-content: center; gap: 3px; align-items: center; }
.nav-btn {
    background: #222;
    color: #fff;
    border: 1px solid #555;
    border-radius: 6px;
    min-width: 38px;
    height: 38px;
    font-size: 18px;
    cursor: pointer;
    padding: 0 3px;
    -webkit-tap-highlight-color: rgba(255,255,0,0.3);
    user-select: none;
    flex: 0 0 auto;
    display: flex; flex-direction: column;
    align-items: center; justify-content: center;
    line-height: 1; gap: 1px;
}
.nav-btn.dir { font-size: 20px; min-width: 40px; height: 40px; }
.nav-btn.act { background: #121228; border-color: #446; min-width: 36px; }
.nav-btn.act span { font-size: 14px; line-height: 1; }
.nav-btn.act small { font-size: 8px; color: #8af; line-height: 1; }
.nav-btn:active { background: #444; }
.nav-btn.yn  { background: #220; color: #ff0; border-color: #aa6; min-width: 36px; }
.nav-btn.enter { background: #020; color: #0f0; border-color: #0a0; }
.nav-btn.esc { background: #200; color: #f44; border-color: #a00; }
.nav-btn.kbd { background: #111; font-size: 20px; }

/* Y/N タッチオーバーレイ */
#yn-overlay {
    display: none;
    position: fixed;
    inset: 0;
    background: rgba(0,0,0,0.72);
    z-index: 80;
    align-items: flex-end;
    justify-content: center;
    padding-bottom: 145px;
}
#yn-overlay.active { display: flex; }
#yn-box {
    background: #111;
    border: 2px solid #0af;
    border-radius: 12px;
    padding: 14px 18px 12px;
    min-width: min(340px, 92vw);
    text-align: center;
}
#yn-query {
    color: #ff0;
    font-family: 'Courier New', monospace;
    font-size: 14px;
    margin-bottom: 12px;
    word-break: break-all;
}
#yn-btns { display: flex; gap: 10px; justify-content: center; flex-wrap: wrap; }
.yn-choice-btn {
    min-width: 68px; height: 54px;
    border-radius: 8px; border: 2px solid #555;
    background: #222; color: #fff;
    font-size: 22px; font-weight: bold;
    cursor: pointer;
    -webkit-tap-highlight-color: rgba(255,255,0,0.3);
}
.yn-choice-btn.yes { background: #042; border-color: #0f0; color: #0f0; }
.yn-choice-btn.no  { background: #200; border-color: #f00; color: #f44; }
.yn-choice-btn.def { background: #220; border-color: #ff0; color: #ff0; }
.yn-choice-btn:active { filter: brightness(1.6); }
</style>
</head>
<body>
<!-- 3D WebGL キャンバス -->
<canvas id="canvas3d"></canvas>

<!-- UIオーバーレイ -->
<div id="ui-overlay">
    <div id="messages"></div>
    <div id="status"></div>
</div>

<!-- 開発中バナー -->
<div id="dev-banner">🚧 開発中 (Work In Progress) — 機能は予告なく変更されることがあります</div>

<!-- ローディング表示 -->
<div id="loading">Loading NetHack 3D...\n(初回は数秒かかります)</div>

<!-- カメラ切替ボタン -->
<button id="cam-btn" title="Tab: カメラ切替">📷 TPS</button>
<!-- 入力待ちインジケーター (緑点滅=入力待ち) -->

<script type="module">
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NetHack 3D — Rust+wgpu レンダラー + NetHack WASM
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━

// NetHack color table
const NH_COLORS = [
    '#333333','#AA0000','#00AA00','#AA5500','#0000CC',
    '#AA00AA','#00AAAA','#AAAAAA','#AAAAAA','#FF5500',
    '#00FF00','#FFFF00','#5555FF','#FF55FF','#55FFFF','#FFFFFF',
];

// glyph_info 構造体オフセット
const GLYPH_TTYCHAR_OFFSET = 4;
const GLYPH_COLOR_OFFSET   = 16;

// マップサイズ
const MAP_W = 80;
const MAP_H = 24;
const MAP_Y_OFFSET = 3; // 行0-2はステータス/メッセージ → 行3-23がダンジョン

// ━━ 3Dタイル定数 ━━
const TILE_EMPTY   = 0;
const TILE_FLOOR   = 1;
const TILE_WALL    = 2;
const TILE_CORRIDOR= 3;
const TILE_DOOR    = 4;
const TILE_PLAYER  = 5;
const TILE_STAIRS_U= 6;
const TILE_STAIRS_D= 7;
const TILE_MONSTER = 8;
const TILE_ITEM    = 9;
const TILE_DOG     = 10;
const TILE_CAT     = 11;
const TILE_RAT     = 12;
const TILE_BAT     = 13;
const TILE_SLIME   = 14;
const TILE_ORC     = 15;
const TILE_ZOMBIE  = 16;
const TILE_SNAKE   = 17;
const TILE_EYE     = 18;
const TILE_UNICORN = 19;
const TILE_TROLL      = 20;
const TILE_DRAGON     = 21;
const TILE_LEPRECHAUN = 22;
const TILE_KOBOLD     = 23;
const TILE_NYMPH      = 24;
const TILE_VAMPIRE    = 25;
const TILE_LICH       = 26;
const TILE_YETI       = 27;
const TILE_ANGEL      = 28;
const TILE_CENTAUR    = 29;
const TILE_GIANT      = 30;
const TILE_WRAITH     = 31;
const TILE_DEMON      = 32;
const TILE_MUMMY      = 33;
const TILE_VAMP_BAT   = 34;
const TILE_GNOME      = 35;
const TILE_STALKER    = 36;
const TILE_XORN       = 37;
const TILE_MIMIC      = 38;
const TILE_HOBGOBLIN  = 39;
const TILE_RUST_MON   = 40;
const TILE_QUASIT     = 41;
const TILE_GRID_BUG   = 42;
const TILE_GOLEM      = 43;
const TILE_CHEST      = 44;
const TILE_FUNGUS     = 45;
const TILE_HUMANOID   = 46;
const TILE_ELEMENTAL  = 47;
const TILE_SEA_MON    = 48;
const TILE_JELLY      = 49;
const TILE_WORM       = 50;
const TILE_NAGA       = 51;
const TILE_IMP        = 52;
const TILE_PUDDING    = 53;
const TILE_ANT        = 54;
const TILE_GARGOYLE   = 55;
const TILE_KRAKEN     = 56;
const TILE_FOUNTAIN   = 57;
const TILE_ALTAR      = 58;
const TILE_TRAP       = 59;
const TILE_PILLAR     = 60;

// ━━ モンスターtier テーブル ━━
// NetHack各キャラの強さを 0=小型 1=通常 2=大型 3=ボス の4段階で表す
// tier はタイル値の上位2ビット (bits 6-5) にエンコードされる
const MONSTER_TIER = {
    // tier 0: 小型/弱い (0.65×)
    'a':0,'b':0,'g':0,'i':0,'k':0,'r':0,'y':0,'B':0,'F':0,
    // tier 1: 通常 (1.0×)
    'c':1,'d':1,'e':1,'f':1,'h':1,'j':1,'l':1,'m':1,'n':1,
    'o':1,'p':1,'q':1,'s':1,'w':1,'x':1,'z':1,
    'G':1,'J':1,'K':1,'M':1,'P':1,'R':1,'W':1,'Y':1,'Z':1,
    // tier 2: 大型 (1.35×)
    't':2,'u':2,'C':2,'E':2,'H':2,'N':2,'O':2,'Q':2,'S':2,'T':2,'X':2,'Y':2,
    // tier 3: ボス (2.0×, 黄金オーラ付き)
    'A':3,'D':3,'I':3,'L':3,'U':3,'V':3,'&':3,
};
function charToTile(ch) {
    if (ch === ' ') return TILE_EMPTY;
    if (ch === '.') return TILE_FLOOR;
    if (ch === '#') return TILE_CORRIDOR;
    if (ch === '-' || ch === '|') return TILE_WALL;
    if (ch === '+') return TILE_DOOR;
    if (ch === '@') return TILE_PLAYER;
    if (ch === '<') return TILE_STAIRS_U;
    if (ch === '>') return TILE_STAIRS_D;
    // モンスター: tierを上位ビットに埋め込む
    const tier = MONSTER_TIER[ch] ?? 1;
    const tierBits = tier << 6;
    if (ch === 'Y')               return TILE_YETI    | tierBits; // イエティ
    if (ch === 'A')               return TILE_ANGEL   | tierBits; // 天使
    if (ch === 'C')               return TILE_CENTAUR | tierBits; // ケンタウルス
    if (ch === 'H')               return TILE_GIANT   | tierBits; // 巨人
    if (ch === 'W' || ch === 'w') return TILE_WRAITH  | tierBits; // レイス/幽霊
    if (ch === '&')               return TILE_DEMON   | tierBits; // デーモン
    if (ch === 'M')               return TILE_MUMMY   | tierBits; // ミイラ
    if (ch === 'v')               return TILE_VAMP_BAT| tierBits; // 吸血コウモリ
    if (ch === 'G')               return TILE_GNOME   | tierBits; // ノーム
    if (ch === 'I')               return TILE_STALKER | tierBits; // 透明ストーカー
    if (ch === 'X')               return TILE_XORN    | tierBits; // クゾーン
    if (ch === 'm')               return TILE_MIMIC   | tierBits; // ミミック
    if (ch === 'h')               return TILE_HOBGOBLIN | tierBits; // ホブゴブリン
    if (ch === 'R')               return TILE_RUST_MON | tierBits; // ラストモンスター
    if (ch === 'q')               return TILE_QUASIT  | tierBits; // クアジット
    if (ch === 'x')               return TILE_GRID_BUG| tierBits; // グリッドバグ
    if (ch === '\'')              return TILE_GOLEM   | tierBits; // ゴーレム
    if (ch === '(' || ch === '$') return TILE_CHEST   | tierBits; // 宝箱/金貨
    if (ch === 'F')               return TILE_FUNGUS  | tierBits; // キノコ
    if (ch === '@')               return TILE_HUMANOID| tierBits; // ヒューマノイド
    if (ch === 'E')               return TILE_ELEMENTAL| tierBits; // エレメンタル
    if (ch === ';')               return TILE_SEA_MON | tierBits; // 海の怪物
    if (ch === 'J')               return TILE_JELLY   | tierBits; // ゼリー/クラゲ
    if (ch === 'P')               return TILE_WORM    | tierBits; // 巨大ワーム
    if (ch === 'l')               return TILE_LEPRECHAUN | tierBits; // レプラコーン
    if (ch === 'k' || ch === 'K') return TILE_KOBOLD    | tierBits; // コボルド
    if (ch === 'n')               return TILE_NYMPH     | tierBits; // ニンフ
    if (ch === 'N')               return TILE_NAGA      | tierBits; // ナーガ
    if (ch === 'i')               return TILE_IMP       | tierBits; // インプ
    if (ch === 'p')               return TILE_PUDDING   | tierBits; // プリン
    if (ch === 'a' || ch === 'A') return TILE_ANT       | tierBits; // アリ/ムカデ
    if (ch === 'g')               return TILE_GARGOYLE  | tierBits; // ガーゴイル
    if (ch === '~')               return TILE_KRAKEN    | tierBits; // クラーケン
    if (ch === '{')               return TILE_FOUNTAIN  | 0;        // 噴水
    if (ch === '_')               return TILE_ALTAR     | 0;        // 祭壇
    if (ch === '^')               return TILE_TRAP      | 0;        // トラップ
    if (ch === '0')               return TILE_PILLAR    | 0;        // 柱
    if (ch === 'V')               return TILE_VAMPIRE   | tierBits; // ヴァンパイア
    if (ch === 'L')               return TILE_LICH      | tierBits; // リッチ
    if (ch === 'd') return TILE_DOG    | tierBits;
    if (ch === 'f' || ch === 'c') return TILE_CAT    | tierBits;
    if (ch === 'r' || ch === 'R') return TILE_RAT    | tierBits;
    if (ch === 'b' || ch === 'B') return TILE_BAT    | tierBits;
    if (ch === 'j' || ch === 'P') return TILE_SLIME  | tierBits;
    if (ch === 'o' || ch === 'O') return TILE_ORC    | tierBits;
    if (ch === 'z' || ch === 'Z') return TILE_ZOMBIE | tierBits;
    if (ch === 's' || ch === 'S') return TILE_SNAKE  | tierBits;
    if (ch === 'e' || ch === 'E') return TILE_EYE    | tierBits;
    if (ch === 'u' || ch === 'U') return TILE_UNICORN| tierBits;
    if (ch === 't' || ch === 'T') return TILE_TROLL  | tierBits;
    if (ch === 'D')               return TILE_DRAGON | tierBits;
    if ((ch >= 'a' && ch <= 'z') || (ch >= 'A' && ch <= 'Z')) return TILE_MONSTER | tierBits;
    if ('$:!?/=%*'.includes(ch)) return TILE_ITEM;
    if (ch !== ' ') return TILE_FLOOR;
    return TILE_EMPTY;
}

// 方向キー → facing (0=N,1=E,2=S,3=W,4=NE,5=SE,6=SW,7=NW)
const KEY_FACING = {
    107: 0, // k → North
    108: 1, // l → East
    106: 2, // j → South
    104: 3, // h → West
    117: 4, // u → NE
    110: 5, // n → SE
    98:  6, // b → SW
    121: 7, // y → NW
};

// ━━ ゲーム状態 ━━
const mapTiles = new Array(MAP_H).fill(null).map(() =>
    new Array(MAP_W).fill(null).map(() => ({ ch: ' ', color: '#aaa' }))
);
let wasmModule = null;
let nethack3d  = null;   // Rust WASMモジュール
let mapDirty   = false;
let playerFacing = 2;    // デフォルト: South
let player3dX = 40.0;
let player3dZ = 10.0;
let rAFRunning = false;

// ━━ UI ━━
const messagesEl = document.getElementById('messages');
const statusEl   = document.getElementById('status');
const loadingEl  = document.getElementById('loading');
const camBtn     = document.getElementById('cam-btn');
const debugPanel = document.getElementById('debug-panel');
let debugLines   = [];
let glyphCallCount = 0;

function dbg(msg) {
    debugLines.push(msg);
    if (debugLines.length > 20) debugLines.shift();
    debugPanel.textContent = debugLines.join('\n');
}
function showMessage(str) {
    if (!str) return;
    messagesEl.textContent = str;
}

// ━━ ミニマップ ━━
const minimapCanvas = document.getElementById('minimap');
const minimapCtx    = minimapCanvas.getContext('2d');
const minimapWrap   = document.getElementById('minimap-wrap');
const MM_W = 480, MM_H = 159;
const DUNGEON_W = MAP_W, DUNGEON_H = MAP_H - MAP_Y_OFFSET; // 80×21
const MM_SX = MM_W / DUNGEON_W;  // ~2px/tile
const MM_SY = MM_H / DUNGEON_H;  // ~2.5px/tile

// タイル種別 → ミニマップ色
const TILE_COL = {
    0: null,           // empty → 描画しない
    1: '#505060',      // floor
    2: '#9090a0',      // wall
    3: '#7a6a48',      // corridor (茶色系 — 背景と区別しやすい)
    4: '#c07a30',      // door
    5: null,           // player → 別途
    6: '#00cc44',      // stairs up
    7: '#cc4400',      // stairs down
    8: '#cc1111',      // monster
    9: '#cccc00',      // item
    10: '#ffaa00',     // dog (暖かいオレンジ)
};

let currentCamMode = 'TPS';

function drawMinimap() {
    const dungeonH = MAP_H - MAP_Y_OFFSET;
    minimapCtx.clearRect(0, 0, MM_W, MM_H);

    // 全タイル描画
    for (let dy = 0; dy < dungeonH; dy++) {
        const gy = dy + MAP_Y_OFFSET;
        for (let dx = 0; dx < DUNGEON_W; dx++) {
            const tile = mapTiles[gy]?.[dx];
            if (!tile) continue;
            const t = charToTile(tile.ch);
            const col = TILE_COL[t];
            if (!col) continue;
            minimapCtx.fillStyle = col;
            minimapCtx.fillRect(
                Math.floor(dx * MM_SX), Math.floor(dy * MM_SY),
                Math.max(1, Math.ceil(MM_SX)), Math.max(1, Math.ceil(MM_SY))
            );
        }
    }

    // プレイヤー: 矢印付きドット
    if (player3dX >= 0) {
        const mx = (player3dX + 0.5) * MM_SX;
        const my = (player3dZ + 0.5) * MM_SY;

        // 向き矢印
        const FACING_RAD = [
            -Math.PI/2,            // 0=N
             0,                    // 1=E
             Math.PI/2,            // 2=S
             Math.PI,              // 3=W
            -Math.PI/4,            // 4=NE
             Math.PI/4,            // 5=SE
             Math.PI + Math.PI/4,  // 6=SW
             Math.PI - Math.PI/4,  // 7=NW
        ];
        const ang = FACING_RAD[playerFacing] ?? Math.PI/2;
        const r = 4.5;
        minimapCtx.strokeStyle = '#fff';
        minimapCtx.lineWidth = 1.5;
        minimapCtx.beginPath();
        minimapCtx.moveTo(mx, my);
        minimapCtx.lineTo(mx + Math.cos(ang)*r, my + Math.sin(ang)*r);
        minimapCtx.stroke();

        // プレイヤードット
        minimapCtx.fillStyle = '#00eeff';
        minimapCtx.beginPath();
        minimapCtx.arc(mx, my, 2.5, 0, Math.PI*2);
        minimapCtx.fill();
    }
}

function updateMinimapVisibility() {
    // 全カメラモードでミニマップを表示
    minimapWrap.classList.remove('hidden');
}

// ━━ 3Dキャンバスリサイズ (キーボード表示時は縮小しない) ━━
const canvas3d = document.getElementById('canvas3d');
let stableW = window.innerWidth;
let stableH = window.innerHeight;

function resizeCanvas3d() {
    const vv = window.visualViewport;
    const w = vv ? vv.width  : window.innerWidth;
    const h = vv ? vv.height : window.innerHeight;

// ━━ 3D 更新: mapTilesから3Dタイル配列を構築してRust WASMに渡す ━━
let prevPlayer3dX = -1, prevPlayer3dZ = -1; // facing計算用

function deltaToFacing(dx, dz) {
    if (dx === 0 && dz < 0) return 0; // N
    if (dx > 0 && dz < 0) return 4;  // NE
    if (dx > 0 && dz === 0) return 1; // E
    if (dx > 0 && dz > 0) return 5;  // SE
    if (dx === 0 && dz > 0) return 2; // S
    if (dx < 0 && dz > 0) return 6;  // SW
    if (dx < 0 && dz === 0) return 3; // W
    if (dx < 0 && dz < 0) return 7;  // NW
    return playerFacing;
}

function update3dMap() {
    if (!nethack3d) return;
    const dungeonH = MAP_H - MAP_Y_OFFSET; // 21行
    const dungeonW = MAP_W;
    const tiles = new Uint8Array(dungeonW * dungeonH);
    let foundPX = -1, foundPZ = -1;
    entityList = []; // エンティティリストをリセット

    for (let dy = 0; dy < dungeonH; dy++) {
        const gy = dy + MAP_Y_OFFSET;
        for (let dx = 0; dx < dungeonW; dx++) {
            const tile = mapTiles[gy] ? mapTiles[gy][dx] : null;
            if (!tile) continue;
            const ch = tile.ch;
            const t = charToTile(ch);
            tiles[dy * dungeonW + dx] = t;
            if (ch === '@') { foundPX = dx; foundPZ = dy; }
            // エンティティ収集 (タップ情報用) — tierビットをマスクして比較
            const bt = t & 0x3F;
            if (bt === TILE_MONSTER || bt === TILE_DOG || bt === TILE_CAT || bt === TILE_RAT || bt === TILE_BAT || bt === TILE_SLIME || bt === TILE_ORC || bt === TILE_ZOMBIE || bt === TILE_SNAKE || bt === TILE_EYE || bt === TILE_UNICORN || bt === TILE_TROLL || bt === TILE_DRAGON || bt === TILE_LEPRECHAUN || bt === TILE_KOBOLD || bt === TILE_NYMPH || bt === TILE_VAMPIRE || bt === TILE_LICH || bt === TILE_YETI || bt === TILE_ANGEL || bt === TILE_CENTAUR || bt === TILE_GIANT || bt === TILE_WRAITH || bt === TILE_DEMON || bt === TILE_MUMMY || bt === TILE_VAMP_BAT || bt === TILE_GNOME || bt === TILE_STALKER || bt === TILE_XORN || bt === TILE_MIMIC || bt === TILE_HOBGOBLIN || bt === TILE_RUST_MON || bt === TILE_QUASIT || bt === TILE_GRID_BUG || bt === TILE_GOLEM || bt === TILE_CHEST || bt === TILE_FUNGUS || bt === TILE_HUMANOID || bt === TILE_ELEMENTAL || bt === TILE_SEA_MON || bt === TILE_JELLY || bt === TILE_WORM || bt === TILE_NAGA || bt === TILE_IMP || bt === TILE_PUDDING || bt === TILE_ANT || bt === TILE_GARGOYLE || bt === TILE_KRAKEN || bt === TILE_FOUNTAIN || bt === TILE_ALTAR || bt === TILE_TRAP || bt === TILE_PILLAR || bt === TILE_ITEM ||
                bt === TILE_STAIRS_U || bt === TILE_STAIRS_D || bt === TILE_PLAYER) {
                entityList.push({ tx: dx, tz: dy, ch, t });
            }
        }
    }

    nethack3d.set_map_nethack3d(tiles, dungeonW, dungeonH);
    if (foundPX >= 0) {
        // NetHack はプレイヤーの向きなし: カメラ固定
        if (prevPlayer3dX >= 0) {
            const dx = foundPX - player3dX;
            const dz = foundPZ - player3dZ;
            if (dx !== 0 || dz !== 0) {
                dbg(`moved dx=${dx} dz=${dz}`);
            }
        }
        prevPlayer3dX = player3dX;
        prevPlayer3dZ = player3dZ;
        player3dX = foundPX;
        player3dZ = foundPZ;
    }
    nethack3d.set_player_nethack3d(player3dX, player3dZ, playerFacing);
    drawMinimap();
    mapDirty = false;
}

}

function sendKey(keyCode) {
    // ゲームにキーを送る。facing更新はupdate3dMap()で実際の移動後に行う
    if (keyResolve) {
        const resolve = keyResolve;
        keyResolve = null;
        setInputReady(false);
        resolve(keyCode);
    } else {
        keyQueue.push(keyCode);
    }
}

// 入力待ちインジケーター
function setInputReady(ready) {
    document.getElementById('input-ready')?.classList.toggle('active', ready);
}

function nethackKeyCode(e) {
    const map = {
        'ArrowUp': 107, 'ArrowDown': 106, 'ArrowLeft': 104, 'ArrowRight': 108,
    };
    if (map[e.key]) return map[e.key];
    if (e.key === 'Enter')     return 13;
    if (e.key === 'Escape')    return 27;
    if (e.key === ' ')         return 32;
    if (e.key === 'Backspace') return 8;
    if (e.key === 'Tab') {
        // Tab → カメラ切替
        switchCamera();
        return null;
    }
    if (e.key.length === 1) return e.key.charCodeAt(0);
    if (e.code === 'Numpad7') return 121; // y
    if (e.code === 'Numpad9') return 117; // u
    if (e.code === 'Numpad1') return 98;  // b
    if (e.code === 'Numpad3') return 110; // n
    if (e.code === 'Numpad5') return 46;  // .
    return null;
}

function processKeyEvent(e) {
    // Shift+左右矢印 → 90°カメラ回転 (PC向け)
    if (e.shiftKey && (e.key === 'ArrowLeft' || e.key === 'ArrowRight')) {
        e.preventDefault();
        rotate90(e.key === 'ArrowRight');
        return;
    }
    const key = nethackKeyCode(e);
    if (key !== null) {
        e.preventDefault();
        sendKey(key);
    }
}
document.addEventListener('keydown', processKeyEvent);

mobileInput.addEventListener('keydown', (e) => {
    processKeyEvent(e);
    e.stopPropagation(); // document の keydown ハンドラへのバブリングを防ぐ (二重送信防止)
    setTimeout(() => {
        mobileInput.value = SENTINEL;
        mobileInput.setSelectionRange(SENTINEL.length, SENTINEL.length);
    }, 0);
});
mobileInput.addEventListener('input', (e) => {
    const val = mobileInput.value;
    if (val.length < SENTINEL.length) {
        sendKey(8); // Backspace
    } else {
        const added = val.slice(SENTINEL.length);
        for (const ch of added) sendKey(ch.charCodeAt(0));
    }
    mobileInput.value = SENTINEL;
    mobileInput.setSelectionRange(SENTINEL.length, SENTINEL.length);
});

// ━━ Dパッド + カメラ基準キーリマップ ━━
// facing: 0=N 1=E 2=S 3=W 4=NE 5=SE 6=SW 7=NW
// 列順: [k, j, h, l, y, u, b, n] → 変換後 char code
const REMAP_TABLE = [
    [107,106,104,108,121,117, 98,110], // N
    [108,104,107,106,117,110,121, 98], // E (90°CW)
    [106,107,108,104,110, 98,117,121], // S (180°)
    [104,108,106,107, 98,121,110,117], // W (90°CCW)
    [117, 98,121,110,107,108,104,106], // NE (45°CW)
    [110,121,117, 98,108,106,107,104], // SE (135°CW)
    [ 98,117,110,121,106,104,108,107], // SW (225°CW)
    [121,110, 98,117,104,107,106,108], // NW (315°CW)
];
const REMAP_KEYS = [107,106,104,108,121,117,98,110]; // k,j,h,l,y,u,b,n

// TOPカメラ専用リマップ: 上下・左右ともに反転
// k→j, j→k, h→l, l→h, 斜めも全成分反転
const TOP_REMAP = [106,107,108,104,110,98,117,121]; // j,k,l,h,n,b,u,y

// facing毎のカメラ基準角
// 注意: +z=南の座標系では angle=3π/4 → SW方向、angle=-3π/4 → NW方向
const FACING_BASE_ANGLE = [
    -Math.PI/2,         // N(0)
     0,                 // E(1)
     Math.PI/2,         // S(2)
     Math.PI,           // W(3)
    -Math.PI/4,         // NE(4)
     Math.PI/4,         // SE(5)
    -3*Math.PI/4,       // facing6 (angle=-3π/4 = NW方向だがRust側でSWラベル)
     3*Math.PI/4,       // facing7 (angle=+3π/4 = SW方向だがRust側でNWラベル)
];

// カメラの現在の合計ヨー角から実効facing(0-7)を計算
function getEffectiveFacing() {
    const base = FACING_BASE_ANGLE[playerFacing] ?? (Math.PI/2);
    let a = base + camYawOffset;
    a = ((a + Math.PI) % (2*Math.PI) + 2*Math.PI) % (2*Math.PI) - Math.PI;
    const P = Math.PI;
    if (a >  7*P/8 || a <= -7*P/8) return 3; // W  (angle≈±π)
    if (a >  5*P/8) return 6; // SW (angle≈3π/4 → cos<0,sin>0 → West+South)
    if (a >  3*P/8) return 2; // S
    if (a >    P/8) return 5; // SE
    if (a > -  P/8) return 1; // E
    if (a > -3*P/8) return 4; // NE
    if (a > -5*P/8) return 0; // N
    return 7; // NW (angle≈-3π/4 → cos<0,sin<0 → West+North)
}

function remapDirKey(code) {
    const i = REMAP_KEYS.indexOf(code);
    if (i < 0) return code;
    // TOPカメラ: カメラが常に北固定なので専用リマップ(左右反転のみ)
    if (currentCamMode === 'TOP') return TOP_REMAP[i];
    return REMAP_TABLE[getEffectiveFacing()][i];
}

    e.preventDefault();
    if (camTouchId !== null) return;
    const t = e.changedTouches[0];
    camTouchId = t.identifier;

    camBaseYaw = camYawOffset;

    e.preventDefault();

        if (t.identifier !== camTouchId) continue;

function dirKeyToward(tx, tz) {
    const dx = tx - player3dX;

    const ax = Math.abs(dx), az = Math.abs(dz);
    if (ax < 0.5 && az < 0.5) return null; // 同じ位置
    // 8方向に量子化
    const angle = Math.atan2(dz, dx); // +z=南, +x=東
    const sector = Math.round(angle / (Math.PI / 4)); // -4〜4
    // sector→ vi key: E=0→108(l), NE=-1→117(u), N=-2→107(k), NW=-3or-4→121(y)
    //                 W=4/-4→104(h), SW=3→98(b), S=2→106(j), SE=1→110(n)
    const KEY_BY_SECTOR = { 0:108, 1:110, 2:106, 3:98, 4:104, '-1':117, '-2':107, '-3':121, '-4':104 };
    return KEY_BY_SECTOR[sector] ?? null;
}

function worldToScreen(wx, wy, wz, vp16, sw, sh) {
    // vp16: column-major 4x4 (col0=[vp[0][0..3]], ...)
    const cx = vp16[0]*wx + vp16[4]*wy + vp16[8]*wz  + vp16[12];
    const cy = vp16[1]*wx + vp16[5]*wy + vp16[9]*wz  + vp16[13];
    const cw = vp16[3]*wx + vp16[7]*wy + vp16[11]*wz + vp16[15];
    if (cw <= 0) return null;
    return [
        (cx/cw + 1) * 0.5 * sw,
        (1 - cy/cw) * 0.5 * sh,
    ];
}

function showEntityPopupAtTouch(tx, ty) {
    if (!nethack3d || entityList.length === 0) return;
    let vp16;
    try { vp16 = nethack3d.get_vp_flat_nethack3d(); } catch(e) { return; }
    const sw = window.innerWidth, sh = window.innerHeight;
    let best = null, bestDist = 60; // px threshold

    for (const ent of entityList) {
        const sc = worldToScreen(ent.tx + 0.5, 0.5, ent.tz + 0.5, vp16, sw, sh);
        if (!sc) continue;
        const d = Math.hypot(sc[0] - tx, sc[1] - ty);
        if (d < bestDist) { bestDist = d; best = ent; }
    }
    if (!best) return;

    // 距離ヘルパー
    const px = Math.round(player3dX), pz = Math.round(player3dZ);
    const isSameTile = best.tx === px && best.tz === pz;
    const isAdjacent = Math.abs(best.tx - px) <= 1 && Math.abs(best.tz - pz) <= 1
                       && !isSameTile;

    // 情報組み立て
    let emoji = '?', title = '???', row1 = '', row2 = '';
    const hash = (best.tx * 13 + best.tz * 7);

    if (best.ch === '@') {
        emoji = '🧙'; title = 'プレイヤー';
        // ステータス行から HP/AC などを抽出
        const st = statusEl.textContent || '';
        const hp  = st.match(/HP:(\d+)\((\d+)\)/);
        const ac  = st.match(/AC:(-?\d+)/);
        const xp  = st.match(/Xp:(\d+)/);
        const dlv = st.match(/Dlvl:(\d+)/);
        const gld = st.match(/\$:(\d+)/);
        if (hp) {
            row1 = `❤️ HP: ${hp[1]}/${hp[2]}  🛡 AC: ${ac?.[1] ?? '?'}  ✨ Xp: ${xp?.[1] ?? '?'}`;
            row2 = `🏰 階: ${dlv?.[1] ?? '?'}  💰 金: ${gld?.[1] ?? '?'}`;
        } else {
            row1 = `位置: (${best.tx}, ${best.tz})`;
            row2 = '探索者よ、気をつけて！';
        }
    } else if (best.ch === 'd' || best.ch === 'f') {
        emoji = '🐕'; title = '犬 (Dog)';
        const szIdx = hash % 3;
        const colIdx = (best.tx * 7 + best.tz * 11) % 5;
        row1 = `サイズ: ${DOG_SIZES[szIdx]}`;
        row2 = `毛色: ${DOG_COLORS[colIdx]}`;
    } else if (best.ch === 'c') {
        emoji = '🐱'; title = 'ネコ (Cat)';
        row1 = isAdjacent ? '隣にいます' : '近くにいます';
    } else if (best.ch === '<') {
        emoji = '🔼'; title = '上り階段';
        row1 = isSameTile ? '重なっています — 昇れます' : '上り階段';
    } else if (best.ch === '>') {
        emoji = '🔽'; title = '下り階段';
        row1 = isSameTile ? '重なっています — 降りられます' : '下り階段';
    } else if ('$:!?/=%*([)'.includes(best.ch)) {
        const itemEmojis = { '$':'💰', ':':'🍖', '!':'⚗️', '?':'📜', '/':'🪄', '=':'💍', '%':'🍎', '*':'💎', '(':'📦', '[':'🛡', ')':'⚔️' };
        emoji = itemEmojis[best.ch] || '✨';
        title = 'アイテム';
        row1 = isSameTile ? '重なっています — 拾えます' : '移動して重なると拾えます';
    } else if (best.ch === 'm') {
        // ミミック：宝箱に見えるが実はモンスター（発見済み）
        emoji = '📦'; title = '！ミミック (Mimic)';
        row1 = '⚠️ 宝箱に化けていたモンスター';
        row2 = isAdjacent ? '隣にいます — 攻撃可能' : '近づくと攻撃してきます';
    } else {
        const info = MONSTER_INFO[best.ch];
        emoji = info?.emoji || '👾';
        title = info ? `${info.name} (${info.en})` : `モンスター (${best.ch})`;
        row1 = isAdjacent ? '隣にいます — 攻撃可能' : '危険! 近づくと戦闘';
    }

    epEmoji.textContent = emoji;
    epTitle.textContent = title;
    epRow1.innerHTML  = row1 ? `<span>${row1}</span>` : '';
    epRow2.innerHTML  = row2 ? `<span>${row2}</span>` : '';

    // アクションボタン
    epActions.innerHTML = '';
    const isPlayer  = best.ch === '@';
    const isMimic   = best.ch === 'm';
    const isMonster = !isPlayer && !isMimic && best.ch !== '<' && best.ch !== '>' &&
                      !'$:!?/=%*([)'.includes(best.ch) &&
                      best.ch !== 'd' && best.ch !== 'f' && best.ch !== 'c';
    const isPet   = best.ch === 'd' || best.ch === 'f' || best.ch === 'c';
    const isItem  = '$:!?/=%*([)'.includes(best.ch);
    const isStairs = best.ch === '<' || best.ch === '>';

    function makeActBtn(label, cls, onClick) {
        const b = document.createElement('button');
        b.className = 'ep-act-btn' + (cls ? ' ' + cls : '');
        b.textContent = label;
        b.setAttribute('tabindex', '-1');
        b.addEventListener('click',    (e) => { e.stopPropagation(); onClick(); hideEntityPopup(); });
        b.addEventListener('touchend', (e) => { e.preventDefault(); e.stopPropagation(); onClick(); hideEntityPopup(); });
        epActions.appendChild(b);
    }

    if (isPlayer) {
        // 同タイルにアイテムがある可能性 → 常に拾うボタン提供
        makeActBtn('⬆️ 拾う (,)', '', () => sendKey(44));
        makeActBtn('📦 持ち物 (i)', 'ep-act-look', () => sendKey(105));
        makeActBtn('🧬 能力 (@)', 'ep-act-look', () => sendKey(64));
    } else if (isMimic || isMonster) {
        if (isAdjacent) {
            const dirKey = dirKeyToward(best.tx, best.tz);
            if (dirKey) makeActBtn('⚔️ 攻撃', '', () => sendKey(dirKey));
        }
        makeActBtn('👁 見る', 'ep-act-look', () => sendKey(58));
    } else if (isPet) {
        if (isAdjacent) {
            // #chat + 方向でペットに話しかける
            const dirKey = dirKeyToward(best.tx, best.tz);
            if (dirKey) {
                makeActBtn('🐾 なでる', 'ep-act-look', () => {
                    // '#chat\n' + 方向
                    [35,99,104,97,116,13,dirKey].forEach(k => keyQueue.push(k));
                });
            }
        }
    } else if (isItem) {
        if (isSameTile) {
            makeActBtn('⬆️ 拾う (,)', '', () => sendKey(44));
        }
    } else if (isStairs) {
        if (isSameTile) {
            const key = best.ch === '>' ? 62 : 60;
            makeActBtn(best.ch === '>' ? '🔽 降りる' : '🔼 昇る', '', () => sendKey(key));
        }
    }

    if (epActions.children.length > 0) {
        entityPopup.classList.add('has-actions');
    } else {
        entityPopup.classList.remove('has-actions');
    }

    // ポップアップ位置 (タップ点の上に表示, 画面端考慮)
    entityPopup.style.display = 'block';
    const pw = entityPopup.offsetWidth  || 180;
    const ph = entityPopup.offsetHeight || 100;
    let popX = tx - pw * 0.5;
    let popY = ty - ph - 16;
    popX = Math.max(6, Math.min(sw - pw - 6, popX));
    popY = Math.max(44, popY);
    entityPopup.style.left = popX + 'px';
    entityPopup.style.top  = popY + 'px';

    if (popupTimer) clearTimeout(popupTimer);
    // アクションボタンがある場合は自動で消えない
    if (epActions.children.length === 0) {
        popupTimer = setTimeout(() => hideEntityPopup(), 3000);
    }
}

// ━━ Y/N タッチオーバーレイ ━━
const ynOverlay = document.getElementById('yn-overlay');
const ynQueryEl = document.getElementById('yn-query');
const ynBtnsEl  = document.getElementById('yn-btns');

function askYN(query, resp, def) {
    return new Promise(resolve => {
        ynQueryEl.textContent = query;
        ynBtnsEl.innerHTML = '';
        const defCode = typeof def === 'number' ? def : (def ? def.charCodeAt(0) : 'n'.charCodeAt(0));
        const validKeys = (resp || 'yn').toLowerCase();

        function finish(code) {
            document.removeEventListener('keydown', onKey);
            ynOverlay.classList.remove('active');
            // キューに残ったYN誤入力をクリア
            keyQueue.length = 0;
            resolve(code);
        }

        // 各選択肢ボタン
        for (const ch of validKeys) {
            const btn = document.createElement('button');
            btn.className = 'yn-choice-btn';
            if (ch === 'y') btn.classList.add('yes');
            else if (ch === 'n') btn.classList.add('no');
            else if (def && ch === def.toLowerCase()) btn.classList.add('def');
            btn.textContent = ch.toUpperCase();
            const code = ch.charCodeAt(0);
            const handler = () => finish(code);
            btn.addEventListener('click', handler);
            btn.addEventListener('touchend', (e) => { e.preventDefault(); handler(); });
            ynBtnsEl.appendChild(btn);
        }
        // キャンセル/デフォルト
        const cancelBtn = document.createElement('button');
        cancelBtn.className = 'yn-choice-btn def';
        cancelBtn.textContent = def ? def.toUpperCase() + '✓' : '✕';
        cancelBtn.addEventListener('click', () => finish(defCode));
        cancelBtn.addEventListener('touchend', (e) => { e.preventDefault(); finish(defCode); });
        ynBtnsEl.appendChild(cancelBtn);

        // キーボードでも応答可
        function onKey(e) {
            if (e.key === 'Escape' || e.key === 'Enter') { finish(defCode); return; }
            if (e.key.length === 1 && validKeys.includes(e.key.toLowerCase())) {
                finish(e.key.charCodeAt(0));
            }
        }
        document.addEventListener('keydown', onKey);
        ynOverlay.classList.add('active');
    });
}

// ━━ テキスト入力ダイアログ ━━
const inputOverlay  = document.getElementById('input-overlay');
const inputPromptEl = document.getElementById('input-prompt');
const inputField    = document.getElementById('input-field');

function askLine(prompt) {
    return new Promise(resolve => {
        inputPromptEl.textContent = prompt;
        inputField.value = '';
        inputOverlay.classList.add('active');
        inputField.focus();
        function onKey(e) {
            if (e.key === 'Enter') {
                const val = inputField.value;
                inputField.removeEventListener('keydown', onKey);
                inputOverlay.classList.remove('active');
                focusMobileInput();
                resolve(val);
            } else if (e.key === 'Escape') {
                inputField.removeEventListener('keydown', onKey);
                inputOverlay.classList.remove('active');
                focusMobileInput();
                resolve('');
            }
        }
        inputField.addEventListener('keydown', onKey);
    });
}

// ━━ メニューシステム ━━
const menuOverlay  = document.getElementById('menu-overlay');
const menuTitleEl  = document.getElementById('menu-title');
const menuItemsEl  = document.getElementById('menu-items');
const menuFooterEl = document.getElementById('menu-footer');

let windows    = {};
let nextWinId  = 10;
let menus      = {};

function createWindow(type) {
    const id = nextWinId++;
    windows[id] = { type, content: [] };
    if (type === 4 || type === 5) menus[id] = { items: [], prompt: '', title: '', how: 0 };
    return id;
}

function setTile(x, y, ch, color) {
    if (x < 0 || x >= MAP_W || y < 0 || y >= MAP_H) return;
    mapTiles[y][x] = { ch, color };
    mapDirty = true;
}

function selectMenuItems(winId, how) {
    return new Promise(resolve => {
        const menu = menus[winId];
        if (!menu) { resolve([]); return; }

        menuTitleEl.textContent = menu.title || 'メニュー';
        menuItemsEl.innerHTML = '';
        menuFooterEl.innerHTML = '';

        const selectedItems = [];

        // アイテム描画
        menu.items.forEach((item, idx) => {
            // テキストが空のアイテムは非表示
            if (!item.str || item.str.trim() === '') return;

            const div = document.createElement('div');
            div.className = 'menu-item';
            div.dataset.idx = idx;
            const keyChar = item.ch || String.fromCharCode(97 + idx);

            const checkSpan = document.createElement('span');
            checkSpan.className = 'check';
            checkSpan.textContent = '';

            const keySpan = document.createElement('span');
            keySpan.className = 'key';
            keySpan.textContent = keyChar;

            const textSpan = document.createElement('span');
            textSpan.className = 'item-text';
            textSpan.textContent = item.str || '';

            div.appendChild(checkSpan);
            div.appendChild(keySpan);
            div.appendChild(textSpan);

            function onItemSelect(e) {
                e.stopPropagation();
                if (how === 0) { cleanup([]); }
                else if (how === 1) { cleanup([{ item: item.identifier, count: -1 }]); }
                else {
                    const existing = selectedItems.findIndex(s => s.item === item.identifier);
                    if (existing >= 0) selectedItems.splice(existing, 1);
                    else selectedItems.push({ item: item.identifier, count: -1 });
                    updateMenuDisplay();
                }
            }
            div.addEventListener('touchend', (e) => { e.preventDefault(); onItemSelect(e); });
            div.addEventListener('click', onItemSelect);
            menuItemsEl.appendChild(div);
        });

        // フッターボタン
        if (how === 0) {
            // 表示のみ: 閉じるボタン
            const closeBtn = document.createElement('button');
            closeBtn.className = 'menu-action-btn cancel';
            closeBtn.textContent = '✕ 閉じる';
            const onClose = () => cleanup([]);
            closeBtn.addEventListener('click', onClose);
            closeBtn.addEventListener('touchend', (e) => { e.preventDefault(); onClose(); });
            menuFooterEl.appendChild(closeBtn);
        } else if (how === 2) {
            // 複数選択: キャンセル + 決定
            const cancelBtn = document.createElement('button');
            cancelBtn.className = 'menu-action-btn cancel';
            cancelBtn.textContent = '✕ キャンセル';
            cancelBtn.addEventListener('click', () => cleanup([]));
            cancelBtn.addEventListener('touchend', (e) => { e.preventDefault(); cleanup([]); });

            const okBtn = document.createElement('button');
            okBtn.className = 'menu-action-btn confirm';
            okBtn.textContent = '✓ 選択完了';
            okBtn.addEventListener('click', () => cleanup(selectedItems));
            okBtn.addEventListener('touchend', (e) => { e.preventDefault(); cleanup(selectedItems); });

            menuFooterEl.appendChild(cancelBtn);
            menuFooterEl.appendChild(okBtn);
        }
        // how === 1: タップで即選択なのでボタン不要

        menuOverlay.classList.add('active');

        function onMenuKey(e) {
            const key = e.key;
            if (key === 'Escape') { cleanup([]); return; }
            if (key === ' ' || key === 'Enter') {
                if (how === 0 || how === 2) { cleanup(how === 2 ? selectedItems : []); return; }
            }
            if (key.length === 1) {
                const charCode = key.charCodeAt(0);
                const item = menu.items.find(i => i.ch && i.ch.charCodeAt(0) === charCode);
                if (item) {
                    if (how === 1) { cleanup([{ item: item.identifier, count: -1 }]); }
                    else if (how !== 0) {
                        const existing = selectedItems.findIndex(s => s.item === item.identifier);
                        if (existing >= 0) selectedItems.splice(existing, 1);
                        else selectedItems.push({ item: item.identifier, count: -1 });
                        updateMenuDisplay();
                    }
                }
            }
        }

        function updateMenuDisplay() {
            menuItemsEl.querySelectorAll('.menu-item').forEach(div => {
                const idx  = parseInt(div.dataset.idx);
                const item = menu.items[idx];
                const isSel = selectedItems.some(s => s.item === item.identifier);
                div.classList.toggle('selected', isSel);
                div.querySelector('.check').textContent = isSel ? '✓' : '';
            });
        }

        function cleanup(result) {
            document.removeEventListener('keydown', onMenuKey);
            menuOverlay.classList.remove('active');
            resolve(result);
        }
        document.addEventListener('keydown', onMenuKey);
    });
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// NetHack winshim コールバック
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
async function nethackCallback(name, ...args) {
    switch (name) {
    case 'shim_init_nhwindows':
        loadingEl.style.display = 'none';
        // モバイルではキーボード自動表示しない
        dbg('init_nhwindows: game started');
        return;

    case 'shim_askname': {
        const playerName = await askLine('Enter your name:');
        keyQueue.length = 0; // 名前入力のEnterなど余分なキーをクリア
        const Module = wasmModule;
        const ptr = Module.nethackGlobal?.pointers?.['plnamesiz'] || 0;
        if (ptr) Module.stringToUTF8(playerName || 'Player', ptr, 256);
        return;
    }

    case 'shim_player_selection_or_tty':
        return true;

    case 'shim_create_nhwindow': {
        const [type] = args;
        return createWindow(type);
    }

    case 'shim_clear_nhwindow': {
        const [winid] = args;
        if (windows[winid]) windows[winid].content = [];
        if (menus[winid]) menus[winid].items = [];
        if (windows[winid]?.type === 3) {
            for (let y = 0; y < MAP_H; y++)
                for (let x = 0; x < MAP_W; x++)
                    mapTiles[y][x] = { ch: ' ', color: '#aaa' };
            mapDirty = true;
        }
        return;
    }

    case 'shim_display_nhwindow': {
        const [winid, blocking] = args;
        const win = windows[winid];
        if (!win) return;
        if (win.type === 3) {
            update3dMap();
        } else if ((win.type === 4 || win.type === 5) && blocking) {
            await waitForKey();
        }
        return;
    }

    case 'shim_destroy_nhwindow': {
        const [winid] = args;
        delete windows[winid];
        delete menus[winid];
        return;
    }

    case 'shim_print_glyph': {
        const [winid, x, y, glyphPtr, bkGlyphPtr] = args;
        if (!glyphPtr) return;
        const Module  = wasmModule;
        const ttychar = Module.getValue(glyphPtr + GLYPH_TTYCHAR_OFFSET, 'i32');
        const colorIdx= Module.getValue(glyphPtr + GLYPH_COLOR_OFFSET, 'i32');
        const ch      = ttychar > 0 && ttychar < 128 ? String.fromCharCode(ttychar) : ' ';
        const color   = NH_COLORS[colorIdx & 0xf] || '#aaa';
        setTile(x, y, ch, color);
        glyphCallCount++;
        if (glyphCallCount <= 5) {
            dbg(`glyph[${glyphCallCount}] xy=(${x},${y}) ttychar=${ttychar}(${ch}) color=${colorIdx}`);
        } else if (glyphCallCount === 6) {
            dbg(`... ${glyphCallCount}+ glyph calls`);
        }
        return;
    }

    case 'shim_curs': return;

    case 'shim_putstr': {
        const [winid, attr, str] = args;
        const win = windows[winid];
        if (!str) return;
        if (win?.type === 1)       showMessage(str);
        else if (win?.type === 2)  statusEl.textContent = (statusEl.textContent || '') + str + ' ';
        else if (win?.type === 4 || win?.type === 5) {
            if (windows[winid]) windows[winid].content.push(str);
        }
        return;
    }

    case 'shim_raw_print':
    case 'shim_raw_print_bold': {
        const [str] = args;
        if (str) showMessage(str);
        return;
    }

    case 'shim_nhgetch':
        if (mapDirty) update3dMap();
        dbg(`nhgetch wait (glyphCalls: ${glyphCallCount})`);
        glyphCallCount = 0;
        return await waitForKey();

    case 'shim_nh_poskey': {
        if (mapDirty) update3dMap();
        return await waitForKey();
    }

    case 'shim_yn_function': {
        const [query, resp, def] = args;
        showMessage(query + ' [' + (resp || 'yn') + ']');
        const key = await askYN(query, resp, def);
        showMessage(query + ' → ' + String.fromCharCode(key));
        return key;
    }

    case 'shim_getlin': {
        const [query, bufPtr] = args;
        const val = await askLine(query || '');
        if (bufPtr && wasmModule) wasmModule.stringToUTF8(val || '', bufPtr, 256);
        return;
    }

    case 'shim_get_ext_cmd': {
        await askLine('Extended command: #');
        return -1;
    }

    case 'shim_start_menu': {
        const [winid] = args;
        if (menus[winid]) menus[winid].items = [];
        return;
    }

    case 'shim_add_menu': {
        const [winid, glyphPtr, identPtr, ch, gch, attr, clr, str] = args;
        if (!menus[winid]) return;
        menus[winid].items.push({
            ch: ch > 0 ? String.fromCharCode(ch) : null,
            str: str || '',
            identifier: identPtr,
            attr, clr,
        });
        return;
    }

    case 'shim_end_menu': {
        const [winid, prompt] = args;
        if (menus[winid]) menus[winid].prompt = prompt || '';
        return;
    }

    case 'shim_select_menu': {
        const [winid, how] = args;
        const result = await selectMenuItems(winid, how);
        return result.length;
    }

    case 'shim_message_menu': {
        const [ch, how, mesg] = args;
        showMessage(mesg || '');
        return await waitForKey();
    }

    case 'shim_mark_synch':
    case 'shim_wait_synch':
        dbg(`synch: mapDirty=${mapDirty}`);
        update3dMap();
        return;

    case 'shim_delay_output':
        await new Promise(r => setTimeout(r, 50));
        return;

    case 'shim_status_init':
        statusEl.textContent = '';
        return;

    case 'shim_status_enablefield':
    case 'shim_status_update':
    case 'shim_nhbell':
    case 'shim_cliparound':
    case 'shim_update_positionbar':
    case 'shim_get_nh_event':
    case 'shim_number_pad':
    case 'shim_suspend_nhwindows':
    case 'shim_resume_nhwindows':
    case 'shim_display_file':
    case 'shim_preference_update':
    case 'shim_change_color':
    case 'shim_change_background':
    case 'shim_putmsghistory':
    case 'shim_status_finish':
        return;

    case 'shim_doprev_message': return 0;
    case 'shim_getmsghistory':  return '';

    case 'shim_exit_nhwindows': {
        const [str] = args;
        showMessage(str || 'Game over. Press F5 to restart.');
        return;
    }

    default:
        return;
    }
}

// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
// WASM 起動
// ━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━━
const CALLBACK_NAME = 'nethackShimCallback';
globalThis[CALLBACK_NAME] = nethackCallback;

loadingEl.textContent = 'Loading NetHack 3D WASM...\n(初回は数秒かかります)';

// 1. Rust 3D WASMを先にロード
import init3d, {
    init_nethack3d,
    tick_nethack3d,
    set_map_nethack3d,
    set_player_nethack3d,
    switch_camera_nethack3d,
    camera_name_nethack3d,
    set_cam_yaw_offset_nethack3d,
    reset_cam_yaw_offset_nethack3d,
    get_vp_flat_nethack3d,
} from './wasm/nethack3d.js';

console.log('[LOAD] init3d() start');
await init3d();
console.log('[LOAD] init3d() done');
nethack3d = {
    init_nethack3d, tick_nethack3d,
    set_map_nethack3d, set_player_nethack3d,
    switch_camera_nethack3d, camera_name_nethack3d,
    set_cam_yaw_offset_nethack3d,
    reset_cam_yaw_offset_nethack3d,
    get_vp_flat_nethack3d,
};
console.log('[LOAD] init_nethack3d() start');
try {
    await init_nethack3d('canvas3d');
    console.log('[LOAD] init_nethack3d() done');
} catch(e) {
    console.error('[LOAD] init_nethack3d() FAILED:', e);
    loadingEl.style.cssText = 'display:block;color:#f55;font-size:20px;z-index:999;background:#000;padding:20px;';
    loadingEl.textContent = '⚠️ 3D描画エラー:\n' + e + '\n\nF12 > Console でエラー確認してください';
    throw e;
}
startRaf();

camBtn.textContent = '📷 ' + camera_name_nethack3d();

loadingEl.textContent = 'Loading NetHack WASM...\n(初回は数秒かかります)';
console.log('[LOAD] NetHack WASM load start');

// 2. NetHack WASM をロード
import NetHackFactory from '../nethack/nethack.js';

const Module = {
    locateFile: (path, prefix) => '../nethack/' + path,
    onRuntimeInitialized: function() {
        console.log('NetHack WASM runtime initialized');
        loadingEl.textContent = 'Starting NetHack...';
        Module.ccall(
            'shim_graphics_set_callback',
            null,
            ['string'],
            [CALLBACK_NAME],
            { async: true }
        );
    },
    print:    (text) => { console.log('[NH]', text); showMessage(text); },
    printErr: (text) => { console.warn('[NH ERR]', text); },
};

wasmModule = await NetHackFactory(Module);
console.log('[LOAD] NetHack WASM factory done');

// タップスタートオーバーレイ: WASMロード完了後に表示
// iOS Safariでは最初のユーザー操作でのみfocus()が許可される
const tapStart = document.getElementById('tap-start');
if (tapStart) {
    const dismiss = () => {
        tapStart.style.display = 'none';
        focusMobileInput();
    };
    tapStart.addEventListener('touchend', (e) => { e.preventDefault(); dismiss(); }, { once: true });
    tapStart.addEventListener('click', dismiss, { once: true });
} else {
    focusMobileInput();
}
</script>
